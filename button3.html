<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Random Dog Image</title>
</head>
<body>
  <h1>Random Dog Image</h1>
  <p>This page shows a random dog image fetched from a public API.</p>

  <div>
    <img id="dogImage" src="" alt="Random dog" width="300" />
  </div>

  <br />
  <button onclick="loadDog()">Another One</button>
  <a href="index.html">Back</a>

  <script>
    function loadDog() {
      fetch("https://dog.ceo/api/breeds/image/random")
        .then(response => response.json())
        .then(data => {
          document.getElementById("dogImage").src = data.message;
        })
        .catch(() => {
          alert("Could not load dog image.");
        });
    }

    loadDog();
  </script>
</body>
</html>
