name: Deploy to EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install unittest-xml-reporting pytest pytest-html pytest-django

      - name: Run tests
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_DEBUG: 'True'
          DB_NAME: testdb
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_HOST: localhost
          DB_PORT: 5432
          DJANGO_SETTINGS_MODULE: backend.settings
        run: |
          mkdir -p test-reports/backend
          cd backend
          python manage.py migrate --noinput
          pytest accounts forum help_requests \
            --junitxml=../test-reports/backend/results.xml \
            --html=../test-reports/backend/report.html \
            --self-contained-html \
            -p no:cacheprovider

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: test-reports/backend/

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Install report tools
        run: cd frontend && npm install jest-junit

      - name: Run tests
        env:
          JEST_JUNIT_OUTPUT_DIR: ../test-reports/frontend
          JEST_JUNIT_OUTPUT_NAME: results.xml
        run: |
          mkdir -p test-reports/frontend
          cd frontend && npm test -- --ci \
            --reporters=default \
            --reporters=jest-junit

      - name: Upload frontend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: test-reports/frontend/

  android-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > mobile/app/google-services.json

      - name: Run unit tests
        run: |
          cd mobile
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew testDebugUnitTest --no-daemon

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            mobile/app/build/reports/tests/testDebugUnitTest/
            mobile/app/build/test-results/testDebugUnitTest/

  deploy:
    runs-on: ubuntu-latest
    needs: [test, frontend-test, android-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd bounswe2026group8
            git pull
            docker-compose up --build -d
