name: Deploy to EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install unittest-xml-reporting

      - name: Run tests
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_DEBUG: 'True'
          DB_NAME: testdb
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_HOST: localhost
          DB_PORT: 5432
          TEST_OUTPUT_DIR: ${{ github.workspace }}/test-reports/backend
        run: |
          mkdir -p ${{ github.workspace }}/test-reports/backend
          cd backend
          python manage.py migrate --noinput
          python manage.py test accounts forum help_requests \
            --testrunner=xmlrunner.extra.djangotestrunner.XMLTestRunner \
            --verbosity=2
          # xmlrunner writes TEST-*.xml into cwd; move them to the expected location
          mv TEST-*.xml ${{ github.workspace }}/test-reports/backend/ 2>/dev/null || true

      - name: Publish backend test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Test Results
          path: test-reports/backend/TEST-*.xml
          reporter: java-junit

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: test-reports/backend/

  frontend-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Install report tools
        run: cd frontend && npm install jest-junit

      - name: Run tests
        env:
          JEST_JUNIT_OUTPUT_DIR: ../test-reports/frontend
          JEST_JUNIT_OUTPUT_NAME: results.xml
        run: |
          mkdir -p test-reports/frontend
          cd frontend && npm test -- --ci \
            --reporters=default \
            --reporters=jest-junit

      - name: Publish frontend test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Frontend Test Results
          path: test-reports/frontend/results.xml
          reporter: java-junit

      - name: Upload frontend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: test-reports/frontend/

  android-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' | base64 -d > mobile/app/google-services.json

      - name: Run unit tests
        run: |
          cd mobile
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew testDebugUnitTest --no-daemon

      - name: Publish Android test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Android Test Results
          path: mobile/app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            mobile/app/build/reports/tests/testDebugUnitTest/
            mobile/app/build/test-results/testDebugUnitTest/

  e2e:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Run migrations
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_DEBUG: 'True'
          DB_NAME: testdb
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_HOST: localhost
          DB_PORT: 5432
        run: cd backend && python manage.py migrate --noinput

      - name: Start Django backend
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_DEBUG: 'True'
          DB_NAME: testdb
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_HOST: localhost
          DB_PORT: 5432
        run: cd backend && python manage.py runserver 127.0.0.1:8000 &

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Start Vite dev server
        env:
          VITE_API_BASE: http://127.0.0.1:8000
        run: cd frontend && npm run dev -- --host 127.0.0.1 &

      - name: Wait for servers
        run: npx wait-on tcp:127.0.0.1:8000 http://127.0.0.1:5173 --timeout 60000

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
        run: cd frontend && npm run e2e

      - name: Publish E2E test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Test Results
          path: frontend/test-results/results.xml
          reporter: java-junit

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

  deploy:
    runs-on: ubuntu-latest
    needs: [test, frontend-test, android-test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd bounswe2026group8
            git pull
            docker-compose up --build -d
