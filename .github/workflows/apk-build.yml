name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > mobile/app/google-services.json

      - name: Make gradlew executable
        run: chmod +x mobile/gradlew

      - name: Build debug APK
        run: |
          cd mobile
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: mobile/app/build/outputs/apk/debug/app-debug.apk

      - name: Create or update pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mvp-milestone
          name: 0.1.0-alpha
          prerelease: true
          body: |
            Pre-release build for MVP milestone.

            Requirements covered:
            - User registration and login
            - Forum posts, comments, upvotes/downvotes
            - Help requests and offers with category/urgency filtering
            - Map and geolocation for help requests
            - Push notifications for experts on new help requests
            - User profiles with availability and expertise fields
            - Offline information and map sections
          files: mobile/app/build/outputs/apk/debug/app-debug.apk
