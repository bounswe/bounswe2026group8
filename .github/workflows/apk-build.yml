name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > mobile/app/google-services.json

      - name: Make gradlew executable
        run: chmod +x mobile/gradlew

      - name: Fix gradlew JVM opts quoting
        run: sed -i "s/DEFAULT_JVM_OPTS='\".*\"'/DEFAULT_JVM_OPTS=\"-Xmx64m -Xms64m\"/" mobile/gradlew

      - name: Build debug APK
        env:
          JAVA_TOOL_OPTIONS: ""
          _JAVA_OPTIONS: ""
        run: |
          cd mobile
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: mobile/app/build/outputs/apk/debug/app-debug.apk

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/app/build/outputs/apk/debug/app-debug.apk
