name: Build Android APK

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > mobile/app/google-services.json

      - name: Fix gradlew line endings and permissions
        run: |
          sed -i 's/\r//' mobile/gradlew
          chmod +x mobile/gradlew

      - name: Set production API URL for debug build
        run: sed -i 's|http://10.0.2.2:8000/|https://emergencyhub.duckdns.org/api/|' mobile/app/build.gradle.kts

      - name: Build debug APK
        env:
          JAVA_TOOL_OPTIONS: "-Xmx2048m"
        run: |
          cd mobile
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: mv mobile/app/build/outputs/apk/debug/app-debug.apk mobile/app/build/outputs/apk/debug/emergency-hub.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: emergency-hub
          path: mobile/app/build/outputs/apk/debug/emergency-hub.apk

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/app/build/outputs/apk/debug/emergency-hub.apk
