version: "3.8"

# Local override — use with:
#   docker-compose -f docker-compose.yml -f docker-compose.local.yml up --build
#
# Differences from prod:
#   - Nginx serves HTTP only (no SSL, no letsencrypt mount)
#   - DJANGO_DEBUG defaults to True
#   - firebase-credentials.json is optional (notifications silently disabled if missing)

services:
  backend:
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py populate_sample_data &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  nginx:
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf
      - media_data:/media:ro

volumes:
  media_data:
